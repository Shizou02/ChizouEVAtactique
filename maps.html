<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StratHub — Maps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --black:    #060a0f;
        --dark:     #0b1018;
        --panel:    #0f1620;
        --border:   rgba(255,255,255,0.07);
        --gold:     #c8973a;
        --gold-dim: rgba(200,151,58,0.15);
        --gold-glow:rgba(200,151,58,0.45);
        --cyan:     #2dd4bf;
        --text:     #d4dde8;
        --text-dim: rgba(212,221,232,0.45);
        --font-hud: 'Share Tech Mono', monospace;
        --font-title:'Barlow Condensed', sans-serif;
        --font-ui:  'Rajdhani', sans-serif;
      }

      html, body {
        min-height: 100vh;
        background: var(--black);
        color: var(--text);
        font-family: var(--font-ui);
        overflow-x: hidden;
      }

      /* Scanlines */
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      }

      /* Vignette */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
      }

      /* BG canvas */
      #bg-canvas {
        position: fixed; inset: 0; z-index: 0;
        pointer-events: none; opacity: 0.4;
      }

      .page {
        position: relative; z-index: 2;
        min-height: 100vh; display: flex; flex-direction: column;
      }

      /* ── Topbar ── */
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 28px;
        border-bottom: 1px solid var(--border);
        background: rgba(6,10,15,0.9);
        backdrop-filter: blur(12px);
        position: sticky; top: 0; z-index: 10;
      }

      .topbar-left { display: flex; align-items: center; gap: 14px; }

      .topbar-logo {
        height: 36px; width: auto;
        mix-blend-mode: lighten; filter: brightness(1.1);
      }

      .topbar-brand {
        font-family: var(--font-title);
        font-size: 24px; font-weight: 900;
        letter-spacing: 0.06em; text-transform: uppercase; color: #fff;
      }
      .topbar-brand span { color: var(--gold); }

      .topbar-right {
        display: flex; align-items: center; gap: 16px;
      }

      .back-btn {
        font-family: var(--font-hud);
        font-size: 14px; letter-spacing: 0.1em;
        color: var(--text-dim); text-decoration: none;
        border: 1px solid var(--border);
        padding: 8px 18px; border-radius: 3px;
        transition: color 0.2s, border-color 0.2s;
        text-transform: uppercase;
      }
      .back-btn:hover { color: var(--gold); border-color: var(--gold-glow); }

      /* ── Page header ── */
      .page-header {
        padding: 40px 28px 30px;
        border-bottom: 1px solid var(--border);
        opacity: 0;
        animation: fade-up 0.6s ease forwards 0.2s;
      }

      .page-eyebrow {
        font-family: var(--font-hud);
        font-size: 12px; letter-spacing: 0.25em;
        color: var(--gold); text-transform: uppercase; margin-bottom: 12px;
      }

      .page-title {
        font-family: var(--font-title);
        font-size: clamp(36px, 5vw, 60px);
        font-weight: 900; text-transform: uppercase;
        letter-spacing: 0.02em; color: #fff; line-height: 1;
      }
      .page-title span { color: var(--gold); }

      .page-subtitle {
        margin-top: 8px;
        font-family: var(--font-ui);
        font-size: 15px; font-weight: 500;
        color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase;
      }

      /* ── Maps grid ── */
      .maps-container {
        padding: 28px;
        flex: 1;
        opacity: 0;
        animation: fade-up 0.6s ease forwards 0.4s;
      }

      .maps-hint {
        font-family: var(--font-hud);
        font-size: 12px; letter-spacing: 0.2em;
        color: var(--text-dim); text-transform: uppercase;
        margin-bottom: 20px;
        display: flex; align-items: center; gap: 10px;
      }
      .maps-hint::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, var(--border), transparent);
      }

      .maps-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }

      .map-card {
        position: relative;
        display: block; text-decoration: none; color: inherit;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 3px;
        overflow: hidden;
        transition: transform 0.2s ease, border-color 0.2s ease;
        cursor: pointer;
      }

      .map-card::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(180deg, transparent 50%, rgba(6,10,15,0.9) 100%);
        z-index: 1; pointer-events: none;
      }

      /* top-left corner accent */
      .map-card::after {
        content: '';
        position: absolute; top: 0; left: 0;
        width: 16px; height: 16px;
        border-top: 2px solid var(--gold);
        border-left: 2px solid var(--gold);
        opacity: 0; z-index: 2;
        transition: opacity 0.2s;
      }

      .map-card:hover { transform: translateY(-3px); border-color: var(--gold-glow); }
      .map-card:hover::after { opacity: 1; }

      .map-card img {
        width: 100%; height: 175px;
        object-fit: cover; display: block;
        filter: saturate(0.7) brightness(0.7);
        transition: filter 0.3s ease;
      }
      .map-card:hover img { filter: saturate(1) brightness(0.85); }

      .map-card-body {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 12px 14px; z-index: 2;
      }

      .map-card-index {
        font-family: var(--font-hud);
        font-size: 11px; letter-spacing: 0.18em;
        color: var(--gold); text-transform: uppercase;
        margin-bottom: 4px;
      }

      .map-card-name {
        font-family: var(--font-title);
        font-size: 24px; font-weight: 700;
        text-transform: uppercase; color: #fff;
        letter-spacing: 0.04em;
      }

      .map-card-enter {
        position: absolute; top: 10px; right: 12px;
        font-family: var(--font-hud);
        font-size: 13px; color: var(--gold);
        opacity: 0; transform: translateY(4px);
        transition: opacity 0.2s, transform 0.2s; z-index: 2;
      }
      .map-card:hover .map-card-enter { opacity: 1; transform: translateY(0); }

      /* ── Footer ── */
      .footer {
        border-top: 1px solid var(--border);
        padding: 14px 28px;
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(6,10,15,0.6);
      }
      .footer-left {
        font-family: var(--font-hud); font-size: 12px;
        color: var(--text-dim); letter-spacing: 0.12em;
      }
      .footer-right {
        font-family: var(--font-hud); font-size: 12px;
        color: var(--text-dim); letter-spacing: 0.08em;
      }
      .footer-right span { color: var(--gold); }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 600px) {
        .topbar-right .back-btn { font-size: 10px; padding: 5px 10px; }
        .maps-container { padding: 16px; }
        .page-header { padding: 24px 16px 20px; }
      }
    </style>
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="page">

      <header class="topbar">
        <div class="topbar-left">
          <img src="assets/logoStratHub.png" alt="StratHub" class="topbar-logo" />
          <span class="topbar-brand">Strat<span>Hub</span></span>
        </div>
        <div class="topbar-right">
          <a href="index.html" class="back-btn">← Accueil</a>
        </div>
      </header>

      <div class="page-header">
        <div class="page-eyebrow">// Module 01 — Sélection de terrain</div>
        <h1 class="page-title"><span>Maps</span> & Terrains</h1>
        <p class="page-subtitle">Choisir un terrain pour ouvrir le board tactique</p>
      </div>

      <div class="maps-container">
        <div class="maps-hint">// Terrains disponibles</div>
        <div class="maps-grid" id="maps"></div>
      </div>

      <footer class="footer">
        <div class="footer-left">© 2026 — STRATHUB · EVA BATTLE FOR ARENA</div>
        <div class="footer-right">CRÉÉ PAR <span>SHIZOU</span></div>
      </footer>

    </div>

    <script>
      // BG canvas (même hex grid que index)
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, hexes = [];
      const HEX_SIZE = 32;

      function hexCorners(cx, cy, r) {
        const pts = [];
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 180 * (60 * i - 30);
          pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
        }
        return pts;
      }

      function buildGrid() {
        hexes = [];
        const w = HEX_SIZE * Math.sqrt(3), h = HEX_SIZE * 2;
        const cols = Math.ceil(W / w) + 2, rows = Math.ceil(H / (h * 0.75)) + 2;
        for (let row = -1; row < rows; row++) {
          for (let col = -1; col < cols; col++) {
            hexes.push({
              x: col * w + (row % 2 === 0 ? 0 : w / 2),
              y: row * h * 0.75,
              pulse: Math.random() * Math.PI * 2,
              speed: 0.005 + Math.random() * 0.012,
              color: Math.random() > 0.85 ? 'rgba(45,212,191,' : 'rgba(200,151,58,',
            });
          }
        }
      }

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        buildGrid();
      }

      function animate() {
        ctx.clearRect(0, 0, W, H);
        for (const h of hexes) {
          h.pulse += h.speed;
          const alpha = (Math.sin(h.pulse) * 0.5 + 0.5) * 0.2 + 0.02;
          const pts = hexCorners(h.x, h.y, HEX_SIZE - 1);
          ctx.beginPath();
          ctx.moveTo(pts[0][0], pts[0][1]);
          for (let i = 1; i < 6; i++) ctx.lineTo(pts[i][0], pts[i][1]);
          ctx.closePath();
          ctx.strokeStyle = h.color + alpha + ')';
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      resize();
      animate();

      // Load maps
      async function loadMaps() {
        const res = await fetch("maps.json");
        const maps = await res.json();
        const root = document.getElementById("maps");

        root.innerHTML = maps.map((m, i) => `
          <a class="map-card" href="board.html?map=${encodeURIComponent(m.id)}">
            <img src="${m.file}" alt="${m.name}" />
            <div class="map-card-body">
              <div class="map-card-index">// Terrain ${String(i + 1).padStart(2, '0')}</div>
              <div class="map-card-name">${m.name}</div>
            </div>
            <span class="map-card-enter">ENTRER →</span>
          </a>
        `).join('');
      }

      loadMaps().catch(err => {
        console.error(err);
        document.getElementById("maps").innerHTML = '<div style="color:rgba(255,255,255,0.4);font-family:var(--font-hud);font-size:12px;">ERREUR DE CHARGEMENT</div>';
      });
    </script>
  </body>
</html>
