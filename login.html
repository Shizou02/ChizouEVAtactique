<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StratHub — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <style>
      /* ── Login-specific styles ──────────────────────── */

      .login-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        opacity: 0;
        animation: fade-up 0.6s ease forwards 0.3s;
      }

      .login-card::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--gold), transparent);
        opacity: 0.6;
      }

      .login-header {
        padding: 28px 28px 0;
        text-align: center;
      }

      .login-icon {
        width: 56px; height: 56px;
        margin: 0 auto 16px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 4px;
        background: var(--gold-dim);
        border: 1px solid rgba(200,151,58,0.25);
      }
      .login-icon svg {
        width: 28px; height: 28px;
        stroke: var(--gold); fill: none;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      }

      .login-title {
        font-family: var(--font-title);
        font-size: 28px; font-weight: 900;
        text-transform: uppercase; letter-spacing: 0.06em;
        color: #fff;
      }
      .login-title span { color: var(--gold); }

      .login-subtitle {
        font-family: var(--font-hud);
        font-size: 11px; letter-spacing: 0.2em;
        color: var(--text-dim); text-transform: uppercase;
        margin-top: 6px;
      }

      /* ── Tabs ── */
      .login-tabs {
        display: flex;
        margin: 24px 28px 0;
        border-bottom: 1px solid var(--border);
      }

      .login-tab {
        flex: 1;
        padding: 10px 0;
        text-align: center;
        font-family: var(--font-hud);
        font-size: 12px; letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-dim);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        background: none; border-top: none; border-left: none; border-right: none;
      }
      .login-tab:hover { color: var(--text); }
      .login-tab.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
      }

      /* ── Form ── */
      .login-body {
        padding: 24px 28px 28px;
      }

      .login-field {
        margin-bottom: 14px;
      }

      .login-label {
        display: block;
        font-family: var(--font-hud);
        font-size: 10px; letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--gold); opacity: 0.7;
        margin-bottom: 6px;
      }

      .login-input {
        width: 100%;
        font-family: var(--font-ui); font-size: 14px; font-weight: 500;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 3px;
        transition: border-color 0.2s;
      }
      .login-input:focus {
        outline: none;
        border-color: var(--gold-glow);
      }
      .login-input::placeholder { color: var(--text-dim); }

      .login-submit {
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        font-family: var(--font-title);
        font-size: 16px; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: #fff;
        background: linear-gradient(135deg, rgba(200,151,58,0.9), rgba(160,110,20,0.9));
        border: 1px solid var(--gold-glow);
        border-radius: 3px;
        cursor: pointer;
        transition: box-shadow 0.2s, transform 0.2s;
      }
      .login-submit:hover {
        box-shadow: 0 4px 20px rgba(200,151,58,0.4);
        transform: translateY(-1px);
      }
      .login-submit:disabled {
        opacity: 0.5; cursor: not-allowed;
        transform: none; box-shadow: none;
      }

      .login-error {
        font-family: var(--font-hud);
        font-size: 11px; letter-spacing: 0.05em;
        color: #ff6b6b;
        margin-top: 10px;
        min-height: 16px;
      }

      .login-footer {
        text-align: center;
        padding: 0 28px 20px;
      }

      .login-footer a {
        font-family: var(--font-hud);
        font-size: 11px; letter-spacing: 0.1em;
        color: var(--text-dim);
        text-decoration: underline;
        text-underline-offset: 3px;
        transition: color 0.2s;
      }
      .login-footer a:hover { color: var(--gold); }

      /* ── Hide/show panels ── */
      .login-panel { display: none; }
      .login-panel.active { display: block; }
    </style>
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="page">

      <header class="topbar">
        <div class="topbar-left">
          <img src="assets/logoStratHub.png" alt="StratHub" class="topbar-logo" />
          <span class="topbar-brand">Strat<span>Hub</span></span>
        </div>
        <a href="index.html" class="back-btn">← Accueil</a>
      </header>

      <div class="login-wrap">
        <div class="login-card">

          <div class="login-header">
            <div class="login-icon">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="login-title">Strat<span>Hub</span></div>
            <div class="login-subtitle">// Identification requise</div>
          </div>

          <div class="login-tabs">
            <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">Connexion</button>
            <button class="login-tab" id="tabRegister" onclick="switchTab('register')">Inscription</button>
          </div>

          <!-- Panel Connexion -->
          <div class="login-panel active" id="panelLogin">
            <div class="login-body">
              <div class="login-field">
                <label class="login-label">Email</label>
                <input class="login-input" type="email" id="loginEmail" placeholder="ton@email.com" />
              </div>
              <div class="login-field">
                <label class="login-label">Mot de passe</label>
                <input class="login-input" type="password" id="loginPassword" placeholder="••••••••" />
              </div>
              <button class="login-submit" id="loginBtn" onclick="handleLogin()">Se connecter</button>
              <div class="login-error" id="loginError"></div>
            </div>
          </div>

          <!-- Panel Inscription -->
          <div class="login-panel" id="panelRegister">
            <div class="login-body">
              <div class="login-field">
                <label class="login-label">Pseudo (nom en jeu)</label>
                <input class="login-input" type="text" id="regPseudo" placeholder="Ex: Shizou" maxlength="20" />
              </div>
              <div class="login-field">
                <label class="login-label">Email</label>
                <input class="login-input" type="email" id="regEmail" placeholder="ton@email.com" />
              </div>
              <div class="login-field">
                <label class="login-label">Mot de passe</label>
                <input class="login-input" type="password" id="regPassword" placeholder="Minimum 6 caractères" />
              </div>
              <button class="login-submit" id="regBtn" onclick="handleRegister()">Créer mon compte</button>
              <div class="login-error" id="regError"></div>
            </div>
          </div>

          <div class="login-footer">
            <a href="index.html">Retour à l'accueil</a>
          </div>

        </div>
      </div>

      <footer class="footer">
        <div class="footer-left">© 2026 — STRATHUB · EVA BATTLE FOR ARENA</div>
        <div class="footer-right">CRÉÉ PAR <span>SHIZOU</span></div>
      </footer>

    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
      // ── Tabs ──
      function switchTab(tab) {
        document.getElementById("tabLogin").classList.toggle("active", tab === "login");
        document.getElementById("tabRegister").classList.toggle("active", tab === "register");
        document.getElementById("panelLogin").classList.toggle("active", tab === "login");
        document.getElementById("panelRegister").classList.toggle("active", tab === "register");
        // Clear errors
        document.getElementById("loginError").textContent = "";
        document.getElementById("regError").textContent = "";
      }

      // ── Error messages Firebase → FR ──
      function firebaseErrorFR(code) {
        const map = {
          "auth/email-already-in-use": "Cet email est déjà utilisé.",
          "auth/invalid-email": "Email invalide.",
          "auth/weak-password": "Mot de passe trop faible (min. 6 caractères).",
          "auth/user-not-found": "Aucun compte trouvé avec cet email.",
          "auth/wrong-password": "Mot de passe incorrect.",
          "auth/invalid-credential": "Email ou mot de passe incorrect.",
          "auth/too-many-requests": "Trop de tentatives. Réessaie dans quelques minutes.",
        };
        return map[code] || "Erreur : " + code;
      }

      // ── Login ──
      async function handleLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        const errEl = document.getElementById("loginError");
        const btn = document.getElementById("loginBtn");

        errEl.textContent = "";
        if (!email || !password) { errEl.textContent = "Remplis tous les champs."; return; }

        btn.disabled = true;
        btn.textContent = "Connexion...";

        try {
          await authLogin(email, password);
          window.location.href = "index.html";
        } catch (e) {
          errEl.textContent = firebaseErrorFR(e.code);
          btn.disabled = false;
          btn.textContent = "Se connecter";
        }
      }

      // ── Register ──
      async function handleRegister() {
        const pseudo = document.getElementById("regPseudo").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const errEl = document.getElementById("regError");
        const btn = document.getElementById("regBtn");

        errEl.textContent = "";
        if (!pseudo) { errEl.textContent = "Choisis un pseudo."; return; }
        if (pseudo.length < 2) { errEl.textContent = "Pseudo trop court (min. 2 caractères)."; return; }
        if (!email || !password) { errEl.textContent = "Remplis tous les champs."; return; }

        btn.disabled = true;
        btn.textContent = "Création...";

        try {
          await authRegister(email, password, pseudo);
          window.location.href = "index.html";
        } catch (e) {
          errEl.textContent = firebaseErrorFR(e.code);
          btn.disabled = false;
          btn.textContent = "Créer mon compte";
        }
      }

      // ── Si déjà connecté, redirige vers l'accueil ──
      auth.onAuthStateChanged((user) => {
        if (user) {
          window.location.href = "index.html";
        }
      });

      // ── BG canvas (réutilisé) ──
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, hexes = [];
      const HEX_SIZE = 32;
      function hexCorners(cx, cy, r) {
        const pts = [];
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 180 * (60 * i - 30);
          pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
        }
        return pts;
      }
      function buildGrid() {
        hexes = [];
        const w = HEX_SIZE * Math.sqrt(3), h = HEX_SIZE * 2;
        const cols = Math.ceil(W / w) + 2, rows = Math.ceil(H / (h * 0.75)) + 2;
        for (let row = -1; row < rows; row++)
          for (let col = -1; col < cols; col++)
            hexes.push({ x: col * w + (row % 2 === 0 ? 0 : w / 2), y: row * h * 0.75, pulse: Math.random() * Math.PI * 2, speed: 0.005 + Math.random() * 0.012, color: Math.random() > 0.85 ? 'rgba(45,212,191,' : 'rgba(200,151,58,' });
      }
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; buildGrid(); }
      function animate() {
        ctx.clearRect(0, 0, W, H);
        for (const h of hexes) {
          h.pulse += h.speed;
          const alpha = (Math.sin(h.pulse) * 0.5 + 0.5) * 0.2 + 0.02;
          const pts = hexCorners(h.x, h.y, HEX_SIZE - 1);
          ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
          for (let i = 1; i < 6; i++) ctx.lineTo(pts[i][0], pts[i][1]);
          ctx.closePath(); ctx.strokeStyle = h.color + alpha + ')'; ctx.lineWidth = 0.8; ctx.stroke();
        }
        requestAnimationFrame(animate);
      }
      window.addEventListener('resize', resize); resize(); animate();
    </script>
  </body>
</html>
